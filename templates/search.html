{%extends 'base.html'%}
{% block content %}

    <h3 class="text-uppercase text-warning mb-4"
        style="letter-spacing:2px;">
        Search Term-{{keyword}}
    </h3>
    

    <div class="row mb-5">
        {% if blogs%}
        {% for i in blogs %}
            

                <div class="col-md-6">

                    <div class="card border-0 mb-4">

                        <div class="card-body">

                            <h3><a href="{% url 'blogs' i.slug %}" class="text-dark">{{ i.title }}</a></h3>

                            <small class="text-muted">
                                {{ i.created_at|timesince }}
                                ago |
                                {{ i.author }}
                            </small>

                            <p class="card-text mt-2">
                                {{ i.short_description|truncatewords:25 }}
                            </p>

                        </div>

                    </div>

                </div>

           
        {% endfor %}
        {%else%}
        <p>no post found</p>
        {%endif%}
        

    </div>
{% endblock %}
